services:
  check:
    image: nixos/nix:latest
    working_dir: /repo
    volumes:
      - .:/repo
      - nix-store:/nix
    environment:
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        accept-flake-config = true
    command: nix flake check --impure --all-systems

volumes:
  nix-store:
